<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro programa JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição!</p>

    <!-- JavaScript interno -->
     <!-- Primeiros comando -->
    <script>

        // Number.parseInt(n) conversão para num inteiro 
        // Number.parseFloat(n) conversão para num real
        // Number(n) ele entende tanto os reais quanto os inteiros

       var n1 = Number(window.prompt('Digite um número: ')) // recebe um valor string
       var n2 = Number(window.prompt('Digite outro número: '))// recebe um valor string
       var soma = n1 + n2 
       window.alert(`A soma entre ${n1} e ${n2} é igual a ${soma}`) //usa template string com place roder e crase
       // + para adição
       // + para concatenação
    </script>
</body>
</html>
